<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – FinTrack Pro</title>
    <meta name="description" content="Login to your FinTrack Pro account to view your financial dashboard.">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header .logo-icon {
            width: 56px;
            height: 56px;
            font-size: 1.75rem;
            margin: 0 auto 1rem;
        }

        .auth-header h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
        }

        .auth-card {
            padding: 2.25rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--emerald);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .auth-divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            transition: var(--transition);
        }

        .back-link:hover {
            color: var(--emerald);
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>

    <div class="auth-page">
        <div class="auth-container animate-fadeInUp">
            <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
            <div class="auth-header">
                <div class="logo-icon">💰</div>
                <h1>Welcome Back</h1>
                <p>Login to access your financial dashboard</p>
            </div>

            <div class="card auth-card">
                <div id="alertBox" class="alert alert-hidden"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="email">Email Address</label>
                        <div class="form-control-icon">
                            <i class="fas fa-envelope icon"></i>
                            <input type="email" id="email" class="form-control" placeholder="you@example.com" required
                                autocomplete="email">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <div class="form-control-icon">
                            <i class="fas fa-lock icon"></i>
                            <div class="password-wrapper" style="flex:1">
                                <input type="password" id="password" class="form-control" style="padding-left:2.75rem"
                                    placeholder="Enter your password" required autocomplete="current-password">
                                <button type="button" class="toggle-password" onclick="togglePw(this)"><i
                                        class="fas fa-eye"></i></button>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>

                <div class="auth-divider">New here?</div>
                <a href="/register" class="btn btn-outline btn-full">Create an Account</a>
            </div>

            <div class="auth-footer">
                <p>Secured with 🔒 JWT encryption</p>
            </div>
        </div>
    </div>

    <script>
        function togglePw(btn) {
            const input = btn.previousElementSibling;
            const icon = btn.querySelector('i');
            if (input.type === 'password') { input.type = 'text'; icon.className = 'fas fa-eye-slash'; }
            else { input.type = 'password'; icon.className = 'fas fa-eye'; }
        }

        function showAlert(msg, type = 'error') {
            const box = document.getElementById('alertBox');
            box.className = `alert alert-${type}`;
            box.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${msg}`;
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.classList.add('btn-loading'); btn.innerHTML = 'Logging in...';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('fintrack_token', data.token);
                    localStorage.setItem('fintrack_user', JSON.stringify(data.user));
                    showAlert('Login successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = '/dashboard', 800);
                } else {
                    showAlert(data.error || data.errors?.[0]?.msg || 'Login failed');
                    btn.disabled = false; btn.classList.remove('btn-loading');
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
                }
            } catch (err) {
                showAlert('Network error. Please try again.');
                btn.disabled = false; btn.classList.remove('btn-loading');
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });

        // Redirect if already logged in
        if (localStorage.getItem('fintrack_token')) { window.location.href = '/dashboard'; }
    </script>
</body>

</html>
